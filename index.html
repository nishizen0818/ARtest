<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitnessQuest AR</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #f3e7d3; /* ベージュ */
    font-family: sans-serif;
}

/* エラーメッセージ */
#error {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    z-index: 10;
    text-align: center;
}

/* ARビュー */
model-viewer {
    width: 100%;
    height: 100%;
    background: transparent;
}
</style>
</head>

<body>

<div id="error"></div>

<model-viewer
    id="viewer"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    autoplay
    shadow-intensity="1">
</model-viewer>

<script>
// 1. URLパラメータから「monsterId」を取得
const params = new URLSearchParams(window.location.search);
const monsterId = params.get("monsterId");

const errorBox = document.getElementById("error");

function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
}

/**
 * 🛠️ モンスターIDとファイル名のマッピング定義
 */
const monsterMap = {
    // 🟩 walking シリーズ
    1: { category: "walking", number: "egg" },
    2: { category: "walking", number: "1" },
    3: { category: "walking", number: "2" },
    4: { category: "walking", number: "3" },
    
    // 🟦 running シリーズ
    5: { category: "running", number: "egg" },
    6: { category: "running", number: "1" },
    7: { category: "running", number: "2" },
    8: { category: "running", number: "3" },

    // 🟥 strength シリーズ
    9: { category: "strength", number: "egg" },
    10: { category: "strength", number: "1" },
    11: { category: "strength", number: "2" },
    12: { category: "strength", number: "3" },

    // 🟨 stretch シリーズ
    13: { category: "stretch", number: "egg" },
    14: { category: "stretch", number: "1" },
    15: { category: "stretch", number: "2" },
    16: { category: "stretch", number: "3" },

    // 🟪 sports シリーズ
    17: { category: "sports", number: "egg" },
    18: { category: "sports", number: "1" },
    19: { category: "sports", number: "2" },
    20: { category: "sports", number: "3" }
};

// 2. パラメータのチェックとモデルの読み込み
if (!monsterId) {
    showError("URLパラメータが不足しています（monsterId がありません）");
} else {
    const monsterInfo = monsterMap[monsterId];

    if (!monsterInfo) {
        showError(`未登録のモンスターIDです (ID: ${monsterId})`);
    } else {
        const fileName = `${monsterInfo.category}_${monsterInfo.number}_animation`;
        const viewer = document.getElementById("viewer");
        
        viewer.setAttribute("src", `${fileName}.glb`);
        viewer.setAttribute("ios-src", `${fileName}.usdz`);

        console.log(`[成功] モデルを読み込みました: ${fileName}`);
    }
}
</script>

</body>
</html>
