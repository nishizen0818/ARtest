<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit AR</title>

    <script
        type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>
</head>

<body style="margin:0;">

    <model-viewer
        src="rabbit.usdc"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        autoplay
        shadow-intensity="1"
        style="width:100vw; height:100vh;">
    </model-viewer>

</body>
</html>
