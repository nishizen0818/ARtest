<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rabbit AR</title>

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"
    ></script>
  </head>

  <body style="margin: 0">
    <model-viewer
      src="rabbit.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      autoplay
      style="width: 100vw; height: 100vh"
    >
    </model-viewer>
  </body>
</html>
